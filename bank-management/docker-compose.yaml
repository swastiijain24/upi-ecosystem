services:
  postgres:
    image: postgres:16-alpine
    container_name: bank-management-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
  
  redis:
    image: redis:7
    container_name: bank-management-redis
    ports:
      - "6381:6379"

volumes:
  postgres-data: